<!DOCTYPE html>
<!-- Generated by GitHub Copilot -->
<!--
    Oracle Visual Builder / Redwood-style simulation.
    All visuals use only standard HTML + CSS + vanilla JS —
    the same primitives that Oracle JET (underlying VB) emits.
    Component mapping:
      oj-table            → <table class="oj-table">
      oj-dialog           → .oj-dialog + .oj-dialog-overlay
      oj-button           → <button class="oj-button oj-button-*">
      oj-avatar           → <span class="oj-avatar">
      oj-chip / oj-badge  → <span class="oj-chip oj-chip-*">
      oj-card             → <div class="oj-card">
      oj-metric-card      → <div class="oj-metric-card">
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroVia – Customer Management | Oracle Visual Builder</title>
    <style>
        /* ── Oracle Redwood Design Tokens ─────────────── */
        :root {
            /* Core */
            --oj-bg:                   #ffffff;
            --oj-bg-secondary:         #f4f4ef;
            --oj-bg-tertiary:          #ebebeb;
            --oj-surface:              #ffffff;

            /* Text */
            --oj-text-primary:         #161513;
            --oj-text-secondary:       #595955;
            --oj-text-disabled:        #a8a8a2;
            --oj-text-inverse:         #ffffff;

            /* Brand / Interactive */
            --oj-brand:                #C74634;
            --oj-interactive:          #0572CE;
            --oj-interactive-hover:    #024D8F;
            --oj-interactive-active:   #013A6B;
            --oj-interactive-bg:       #EBF3FC;
            --oj-interactive-bg-hover: #D9EAFA;

            /* Borders */
            --oj-border:               #CECED0;
            --oj-border-focus:         #0572CE;

            /* Status */
            --oj-success:              #2E841E;
            --oj-success-bg:           #E4F5E0;
            --oj-success-border:       #A8D89E;
            --oj-warning:              #975C00;
            --oj-warning-bg:           #FFF0CC;
            --oj-warning-border:       #F5CC69;
            --oj-danger:               #CF3900;
            --oj-danger-bg:            #FDECE6;
            --oj-danger-border:        #F5A182;

            /* Tier chip colors */
            --chip-standard-bg:  #F4F4EF; --chip-standard-fg: #595955;
            --chip-bronze-bg:    #FDF0E6; --chip-bronze-fg:   #7A3E0E;
            --chip-silver-bg:    #ECEFF2; --chip-silver-fg:   #465465;
            --chip-gold-bg:      #FFF3CC; --chip-gold-fg:     #7A5200;
            --chip-platinum-bg:  #EEF1FF; --chip-platinum-fg: #2C3A80;

            /* Elevation */
            --oj-shadow-sm: 0 1px 4px rgba(0,0,0,.10), 0 0 2px rgba(0,0,0,.06);
            --oj-shadow-md: 0 4px 12px rgba(0,0,0,.12), 0 1px 4px rgba(0,0,0,.07);
            --oj-shadow-lg: 0 12px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.08);

            /* Radii */
            --oj-radius-sm:   4px;
            --oj-radius-md:   8px;
            --oj-radius-lg:  12px;
            --oj-radius-pill:20px;

            /* Typography */
            --oj-font: 'Oracle Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI',
                       Helvetica, Arial, sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--oj-font);
            background: var(--oj-bg-secondary);
            color: var(--oj-text-primary);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ── App Shell Global Header ──────────────────── */
        .oj-applayout-header {
            background: var(--oj-bg);
            border-bottom: 1px solid var(--oj-border);
            position: sticky;
            top: 0;
            z-index: 300;
            box-shadow: var(--oj-shadow-sm);
        }

        .oj-applayout-header-inner {
            display: flex;
            align-items: center;
            height: 52px;
            padding: 0 24px;
        }

        .oj-header-branding {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-right: 20px;
            border-right: 1px solid var(--oj-border);
            text-decoration: none;
            flex-shrink: 0;
        }

        /* Oracle logo "O" */
        .oj-oracle-logo {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: var(--oj-brand);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .oj-oracle-logo::after {
            content: '';
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--oj-bg);
        }

        .oj-header-product-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--oj-text-primary);
        }
        .oj-header-product-name span { color: var(--oj-brand); }

        /* Nav tabs */
        .oj-applayout-nav {
            display: flex;
            align-items: stretch;
            padding-left: 4px;
            flex: 1;
            height: 100%;
        }

        .oj-nav-tab {
            display: inline-flex;
            align-items: center;
            padding: 0 16px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--oj-text-secondary);
            text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: color .15s, border-color .15s;
            white-space: nowrap;
            cursor: pointer;
        }
        .oj-nav-tab:hover { color: var(--oj-text-primary); border-bottom-color: var(--oj-border); }
        .oj-nav-tab.oj-selected {
            color: var(--oj-interactive);
            border-bottom-color: var(--oj-interactive);
            font-weight: 600;
        }

        /* Header right actions */
        .oj-header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .oj-header-icon-btn {
            width: 36px; height: 36px;
            border: none;
            background: none;
            border-radius: var(--oj-radius-sm);
            color: var(--oj-text-secondary);
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
        }
        .oj-header-icon-btn:hover { background: var(--oj-bg-secondary); }

        .oj-header-user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px 4px 6px;
            border-radius: var(--oj-radius-pill);
            cursor: pointer;
            transition: background .15s;
        }
        .oj-header-user-chip:hover { background: var(--oj-bg-secondary); }

        .oj-avatar-xs {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--oj-interactive);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .oj-header-user-name { font-size: 13px; font-weight: 500; }

        /* ── Page Content ─────────────────────────────── */
        .oj-applayout-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 28px 56px;
        }

        /* Breadcrumb */
        .oj-breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12.5px;
            color: var(--oj-text-secondary);
            margin-bottom: 16px;
        }
        .oj-breadcrumb a { color: var(--oj-interactive); text-decoration: none; }
        .oj-breadcrumb a:hover { text-decoration: underline; }
        .oj-breadcrumb-sep { color: var(--oj-text-disabled); }

        /* Page header */
        .oj-page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .oj-page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--oj-text-primary);
        }

        .oj-page-subtitle {
            font-size: 13px;
            color: var(--oj-text-secondary);
            margin-top: 4px;
        }

        /* ── Metric Cards ─────────────────────────────── */
        .oj-metric-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .oj-metric-card {
            background: var(--oj-surface);
            border: 1px solid var(--oj-border);
            border-radius: var(--oj-radius-md);
            padding: 16px 20px;
            box-shadow: var(--oj-shadow-sm);
        }

        .oj-metric-label {
            font-size: 11.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--oj-text-secondary);
            margin-bottom: 8px;
        }

        .oj-metric-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--oj-text-primary);
            line-height: 1;
        }

        .oj-metric-sublabel {
            font-size: 12px;
            color: var(--oj-text-secondary);
            margin-top: 6px;
        }

        .oj-metric-accent         { border-top: 3px solid var(--oj-interactive); padding-top: 13px; }
        .oj-metric-accent-success { border-top: 3px solid var(--oj-success);     padding-top: 13px; }
        .oj-metric-accent-warning { border-top: 3px solid var(--oj-warning);     padding-top: 13px; }
        .oj-metric-accent-brand   { border-top: 3px solid var(--oj-brand);       padding-top: 13px; }

        /* ── Panel ────────────────────────────────────── */
        .oj-panel {
            background: var(--oj-surface);
            border: 1px solid var(--oj-border);
            border-radius: var(--oj-radius-md);
            box-shadow: var(--oj-shadow-sm);
            overflow: hidden;
        }

        .oj-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--oj-border);
        }

        .oj-panel-title { font-size: 15px; font-weight: 600; }

        .oj-panel-toolbar { display: flex; align-items: center; gap: 8px; }

        /* ── Search ───────────────────────────────────── */
        .oj-input-search {
            display: flex;
            align-items: center;
            gap: 7px;
            height: 32px;
            padding: 0 12px;
            border: 1px solid var(--oj-border);
            border-radius: var(--oj-radius-sm);
            font-size: 13px;
            color: var(--oj-text-secondary);
            background: var(--oj-surface);
            min-width: 220px;
            transition: border-color .15s;
            cursor: text;
        }
        .oj-input-search:hover { border-color: #9B9B96; }

        /* ── Table ────────────────────────────────────── */
        .oj-table { width: 100%; border-collapse: collapse; }

        .oj-table thead th {
            padding: 10px 16px;
            text-align: left;
            font-size: 11.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--oj-text-secondary);
            background: var(--oj-bg-secondary);
            border-bottom: 1px solid var(--oj-border);
            white-space: nowrap;
        }

        .oj-table tbody tr.oj-table-row {
            border-bottom: 1px solid var(--oj-border);
            transition: background .1s;
            cursor: pointer;
        }
        .oj-table tbody tr.oj-table-row:last-child { border-bottom: none; }
        .oj-table tbody tr.oj-table-row:hover       { background: var(--oj-interactive-bg); }
        .oj-table tbody tr.oj-table-row.oj-selected { background: var(--oj-interactive-bg-hover); }

        .oj-table td {
            padding: 12px 16px;
            vertical-align: middle;
            font-size: 13.5px;
        }

        /* ── Avatar ───────────────────────────────────── */
        .oj-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--oj-interactive-bg);
            border: 1.5px solid var(--oj-interactive);
            color: var(--oj-interactive);
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .oj-cell-person { display: flex; align-items: center; gap: 10px; }
        .oj-cell-person-name { font-size: 13.5px; font-weight: 600; display: block; }
        .oj-cell-person-sub  { font-size: 11.5px; color: var(--oj-text-secondary); margin-top: 1px; }

        /* ── Chips ────────────────────────────────────── */
        .oj-chip {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: var(--oj-radius-pill);
            font-size: 12px;
            font-weight: 600;
        }

        .oj-chip-standard { background: var(--chip-standard-bg); color: var(--chip-standard-fg); }
        .oj-chip-bronze   { background: var(--chip-bronze-bg);   color: var(--chip-bronze-fg); }
        .oj-chip-silver   { background: var(--chip-silver-bg);   color: var(--chip-silver-fg); border: 1px solid var(--oj-border); }
        .oj-chip-gold     { background: var(--chip-gold-bg);     color: var(--chip-gold-fg); }
        .oj-chip-platinum { background: var(--chip-platinum-bg); color: var(--chip-platinum-fg); }

        .oj-chip-tier {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: var(--oj-radius-sm);
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--oj-border);
            background: var(--oj-surface);
            color: var(--oj-text-secondary);
        }

        /* ── Buttons ──────────────────────────────────── */
        .oj-button {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 30px;
            padding: 0 12px;
            border-radius: var(--oj-radius-sm);
            font-family: var(--oj-font);
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background .15s, border-color .15s;
            white-space: nowrap;
        }
        .oj-button:focus-visible { outline: 2px solid var(--oj-border-focus); outline-offset: 2px; }

        .oj-button-primary {
            background: var(--oj-interactive);
            color: var(--oj-text-inverse);
            border-color: var(--oj-interactive);
        }
        .oj-button-primary:hover { background: var(--oj-interactive-hover); border-color: var(--oj-interactive-hover); }

        .oj-button-outlined {
            background: var(--oj-surface);
            color: var(--oj-interactive);
            border-color: var(--oj-interactive);
        }
        .oj-button-outlined:hover { background: var(--oj-interactive-bg); }

        .oj-button-ghost {
            background: transparent;
            color: var(--oj-interactive);
            border-color: transparent;
        }
        .oj-button-ghost:hover { background: var(--oj-interactive-bg); }

        .oj-button-neutral {
            background: var(--oj-surface);
            color: var(--oj-text-secondary);
            border-color: var(--oj-border);
        }
        .oj-button-neutral:hover { background: var(--oj-bg-secondary); color: var(--oj-text-primary); }

        .oj-button-success {
            background: var(--oj-success-bg);
            color: var(--oj-success);
            border-color: var(--oj-success-border);
        }
        .oj-button-success:hover { background: #d2eecc; }

        .oj-button-icon {
            width: 30px; height: 30px;
            padding: 0;
            justify-content: center;
            background: var(--oj-surface);
            color: var(--oj-text-secondary);
            border-color: var(--oj-border);
        }
        .oj-button-icon:hover { background: var(--oj-bg-secondary); color: var(--oj-text-primary); }

        .oj-button-actions { display: flex; gap: 6px; align-items: center; }

        .oj-chevron {
            display: inline-block;
            font-size: 10px;
            transition: transform .25s ease;
            line-height: 1;
        }
        .oj-selected .oj-chevron { transform: rotate(180deg); }

        /* ── Flights Inline Panel ─────────────────────── */
        .oj-flights-row td { padding: 0; }

        .oj-inline-panel {
            display: none;
            background: var(--oj-bg-secondary);
            border-top: 2px solid var(--oj-interactive);
            padding: 20px 24px;
            animation: ojSlide .2s ease;
        }
        .oj-inline-panel.oj-open { display: block; }

        @keyframes ojSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .oj-inline-panel-header {
            font-size: 12.5px;
            font-weight: 700;
            color: var(--oj-text-secondary);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .oj-inline-panel-header::before {
            content: '';
            display: inline-block;
            width: 3px; height: 14px;
            background: var(--oj-interactive);
            border-radius: 2px;
        }

        .oj-flights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }

        /* Flight card */
        .oj-flight-card {
            background: var(--oj-surface);
            border: 1px solid var(--oj-border);
            border-radius: var(--oj-radius-md);
            overflow: hidden;
            box-shadow: var(--oj-shadow-sm);
        }

        .oj-flight-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--oj-interactive);
        }

        .oj-flight-num { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: .5px; }

        .oj-flight-status {
            font-size: 11px; font-weight: 600;
            padding: 2px 8px;
            border-radius: var(--oj-radius-sm);
        }

        .oj-status-confirmed { background: rgba(255,255,255,.25); color: #fff; }
        .oj-status-pending   { background: var(--oj-warning-bg);  color: var(--oj-warning); }

        .oj-flight-card-body { padding: 14px; }

        .oj-flight-route {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .oj-airport { text-align: center; min-width: 56px; }
        .oj-airport-code { font-size: 22px; font-weight: 700; color: var(--oj-text-primary); line-height: 1.1; }
        .oj-airport-name { font-size: 9.5px; color: var(--oj-text-secondary); line-height: 1.3; }

        .oj-route-line {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .oj-route-bar {
            width: 100%; height: 1.5px;
            background: var(--oj-border);
            position: relative;
        }
        .oj-route-bar::after {
            content: '✈';
            position: absolute;
            top: -10px; left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: var(--oj-interactive);
        }

        .oj-route-duration { font-size: 10.5px; color: var(--oj-text-secondary); }

        .oj-flight-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .oj-fd-cell { background: var(--oj-bg-secondary); border-radius: var(--oj-radius-sm); padding: 6px 10px; }
        .oj-fd-label { font-size: 10px; color: var(--oj-text-secondary); text-transform: uppercase; letter-spacing: .3px; }
        .oj-fd-value { font-size: 12.5px; font-weight: 600; margin-top: 2px; }

        /* ── Dialog ───────────────────────────────────── */
        .oj-dialog-overlay {
            position: fixed;
            inset: 0;
            background: rgba(22,21,19,.45);
            z-index: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }
        .oj-dialog-overlay.oj-open { opacity: 1; pointer-events: all; }

        .oj-dialog {
            background: var(--oj-surface);
            border-radius: var(--oj-radius-lg);
            width: 520px;
            max-width: 96vw;
            max-height: 84vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--oj-shadow-lg);
            border: 1px solid var(--oj-border);
            transform: translateY(16px) scale(.98);
            transition: transform .2s ease;
        }
        .oj-dialog-overlay.oj-open .oj-dialog { transform: translateY(0) scale(1); }

        .oj-dialog-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px 14px;
            border-bottom: 1px solid var(--oj-border);
            flex-shrink: 0;
        }

        .oj-dialog-title { font-size: 17px; font-weight: 700; color: var(--oj-text-primary); }
        .oj-dialog-subtitle { font-size: 12.5px; color: var(--oj-text-secondary); margin-top: 3px; }

        .oj-dialog-close {
            width: 30px; height: 30px;
            border: 1px solid var(--oj-border);
            border-radius: var(--oj-radius-sm);
            background: var(--oj-surface);
            color: var(--oj-text-secondary);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
            flex-shrink: 0;
        }
        .oj-dialog-close:hover { background: var(--oj-bg-secondary); }
        .oj-dialog-close:focus-visible { outline: 2px solid var(--oj-border-focus); outline-offset: 2px; }

        .oj-dialog-body { padding: 18px 22px; overflow-y: auto; flex: 1; }

        .oj-dialog-footer {
            padding: 12px 22px;
            border-top: 1px solid var(--oj-border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        /* ── Reward List Item ─────────────────────────── */
        .oj-reward-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid var(--oj-border);
            border-radius: var(--oj-radius-md);
            margin-bottom: 8px;
            transition: border-color .15s, background .15s;
        }
        .oj-reward-item:hover { border-color: var(--oj-interactive); background: var(--oj-interactive-bg); }
        .oj-reward-item.oj-delivered { background: var(--oj-success-bg); border-color: var(--oj-success-border); }
        .oj-reward-item.oj-delivered:hover { background: #d2eecc; }

        .oj-reward-icon {
            width: 40px; height: 40px;
            border-radius: var(--oj-radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .oj-reward-content { flex: 1; min-width: 0; }
        .oj-reward-title { font-size: 13.5px; font-weight: 600; }
        .oj-reward-desc  { font-size: 12.5px; color: var(--oj-text-secondary); margin-top: 2px; }

        .oj-reward-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }

        .oj-reward-expiry { font-size: 11.5px; color: var(--oj-danger); display: flex; align-items: center; gap: 4px; }
        .oj-delivered-label { font-size: 11.5px; font-weight: 600; color: var(--oj-success); display: flex; align-items: center; gap: 4px; }

/**
 * Returns the nearest upcoming flight based on date and time.
 * @param {Array} flights Customer upcoming flights.
 * @returns {Object|null} Earliest upcoming flight or null.
 */
function getNextFlight(flights) {
    if (!Array.isArray(flights) || flights.length === 0) return null;
    return flights.reduce((soonest, current) => {
        const soonestTs = new Date(`${soonest.date} ${soonest.time}`).getTime();
        const currentTs = new Date(`${current.date} ${current.time}`).getTime();
        return currentTs < soonestTs ? current : soonest;
    });
}

}

/* ─── TOGGLE FLIGHTS ─────────────────────────────────────── */
function toggleFlights(id) {
    const panel = document.getElementById(`panel-${id}`);
    const row   = document.getElementById(`row-${id}`);
    const btn   = document.getElementById(`expbtn-${id}`);
    const isOpen = panel.classList.contains('oj-open');

    document.querySelectorAll('.oj-inline-panel').forEach(p => p.classList.remove('oj-open'));
    document.querySelectorAll('.oj-table-row').forEach(r => {
        r.classList.remove('oj-selected');
        r.setAttribute('aria-expanded', 'false');
    });
    document.querySelectorAll('[id^="expbtn-"]').forEach(b => b.setAttribute('aria-expanded', 'false'));

    if (!isOpen) {
        panel.classList.add('oj-open');
        row.classList.add('oj-selected');
        row.setAttribute('aria-expanded', 'true');
        if (btn) btn.setAttribute('aria-expanded', 'true');
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

}

function renderRewardsList(c) {

        return `

            <p><strong>Customer:</strong> ${esc(fullName)}</p>
            <p>Dear ${esc(customer.firstName)},</p>
            <p>Congratulations. A promo code has been assigned to you to use it till May 30, 2026.</p>
            <p>Enjoy!</p>
            <p><strong>Reward:</strong> ${reward ? esc(reward.title) : ''}</p>
        </body>
        </html>
    `;

    const blob = new Blob(['\ufeff', docHtml], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reward-letter-${customerId}-${rewardIdx + 1}.doc`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}

/* ─── CHECK REWARD DIALOG ────────────────────────────────── */
function openCheck(e, id) {
    e.stopPropagation();
    const c  = customers.find(x => x.id === id);
    const sr = c.suggested;

    document.getElementById('dlgCheckSub').textContent = `Recommended for ${c.firstName} ${c.lastName}`;

    document.getElementById('dlgCheckBody').innerHTML = `
        <div class="oj-suggested-header">
            <div class="oj-suggested-icon-wrap" aria-hidden="true">${sr.icon}</div>
            <div class="oj-suggested-info">
                <h3>${esc(sr.title)}</h3>
                <p>${esc(sr.desc)}</p>
                <span class="oj-badge-pill">${esc(sr.badge)}</span>
            </div>
        </div>
        <div class="oj-benefit-list" aria-label="Included benefits">
            ${sr.benefits.map(b => `
                <div class="oj-benefit-row">
                    <span class="oj-benefit-check" aria-hidden="true">✓</span>
                    <span>${esc(b)}</span>
                </div>
            `).join('')}
        </div>
        <div class="oj-activate-notice" id="actNotice-${id}" role="status" aria-live="polite"></div>
    `;

    document.getElementById('dlgCheckFooter').innerHTML = `
        <button class="oj-button oj-button-neutral" onclick="closeDialog('dlgCheck')">Cancel</button>
        <button class="oj-button oj-button-primary" id="actBtn-${id}"
                onclick="activateReward(${id},'${esc(c.firstName + ' ' + c.lastName)}')"
                aria-label="Generate reward ${esc(sr.title)} for ${esc(c.firstName)} ${esc(c.lastName)}">
            Generate Reward
        </button>
    `;

    openDialog('dlgCheck');
}

function activateReward(id, name) {
    const btn    = document.getElementById(`actBtn-${id}`);
    const notice = document.getElementById(`actNotice-${id}`);
    if (!btn) return;
    btn.textContent = 'Generated';
    btn.disabled = true;
    btn.classList.replace('oj-button-primary', 'oj-button-success');
    notice.textContent = 'Reward is generated. Please check details in Rewards Available';
    notice.style.display = 'block';
}

/* ─── DIALOG UTILITIES ───────────────────────────────────── */
function openDialog(id) {
    const el = document.getElementById(id);
    el.classList.add('oj-open');
    document.body.style.overflow = 'hidden';
    el.querySelector('.oj-dialog-close').focus();
}

function closeDialog(id) {
    document.getElementById(id).classList.remove('oj-open');
    document.body.style.overflow = '';
}

/* Click-outside to close */
document.querySelectorAll('.oj-dialog-overlay').forEach(el => {
    el.addEventListener('click', function(e) {
        if (e.target === this) closeDialog(this.id);
    });
});

/* ESC to close */
document.addEventListener('keydown', e => {
    if (e.key === 'Escape')
        document.querySelectorAll('.oj-dialog-overlay.oj-open').forEach(m => closeDialog(m.id));
});

/* ─── INIT ───────────────────────────────────────────────── */
renderTable();
</script>
